<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <h:outputStylesheet library="css" name="estilo.css" />
    <title>Produtos</title>
</h:head>
<h:body>

    <h1>Lista de Produtos</h1>

    <h:dataTable value="#{produtoBean.lista}" var="p" styleClass="tabela-clientes">
        <h:column>#{p.id}</h:column>
        <h:column>#{p.descricao}</h:column>
        <h:column>#{p.preco}</h:column>
        <h:column>#{p.estoque}</h:column>
        <h:column>#{produtoBean.nomeCategoria(p.idCategoria)}</h:column>
        <h:column>
            <h:form>
                <h:commandButton value="Editar" action="#{produtoBean.editar(p)}" />
                <h:commandButton value="Excluir" action="#{produtoBean.excluir(p)}" />
            </h:form>
        </h:column>
    </h:dataTable>

    <br/>
    <h:link outcome="/produtos/form" value="Nova Produto" styleClass="btn-link" />
    <br/>
    <h:link outcome="/index" value="Voltar ao Menu" styleClass="btn-link"/>

</h:body>
</html>
