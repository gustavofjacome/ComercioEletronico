<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <h:outputStylesheet library="css" name="estilo.css" />
    <title>Produto - Formulário</title>
</h:head>
<h:body>

    <h1>Cadastro de Produto</h1>

    <h:form>
        <h:outputLabel for="descricao" value="Descrição: " />
        <h:inputText id="descricao" value="#{produtoBean.produto.descricao}" required="true" />
        <h:message for="descricao" />
        <br/>

        <h:outputLabel for="preco" value="Preço: " />
        <h:inputText id="preco" value="#{produtoBean.produto.preco}" required="true" />
        <h:message for="preco" />
        <br/>

        <h:outputLabel for="estoque" value="Estoque: " />
        <h:inputText id="estoque" value="#{produtoBean.produto.estoque}" required="true"/>
        <h:message for="estoque" />
        <br/>

        <h:outputLabel for="categoria" value="Categoria: " />
        <h:selectOneMenu id="categoria" value="#{produtoBean.produto.idCategoria}" required="true">
            <f:selectItem itemLabel="-- Selecione --" itemValue="0" />
            <f:selectItems value="#{produtoBean.categorias}" var="cat"
                           itemLabel="#{cat.descricao}" itemValue="#{cat.id}" />
        </h:selectOneMenu>
        <h:message for="categoria" />
        <br/>
        <h:commandButton value="Salvar" action="#{produtoBean.salvar}" styleClass="btn-link"/>
    </h:form>
    <br/>
    <h:link outcome="/produtos/listar" value="Voltar para a listagem" styleClass="btn-link"/>



</h:body>
</html>
