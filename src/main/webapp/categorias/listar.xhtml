<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <h:outputStylesheet library="css" name="estilo.css" />
    <title>Clientes</title>
</h:head>
<h:body>

    <h1>Lista de Categorias</h1>

    <h:dataTable value="#{categoriaBean.lista}" var="c" styleClass="tabela-clientes">
        <h:column>#{c.id}</h:column>
        <h:column>#{c.descricao}</h:column>
        <h:column>
            <h:form>
                <h:commandButton value="Editar" action="#{categoriaBean.editar(c)}" />
                <h:commandButton value="Excluir" action="#{categoriaBean.excluir(c)}" />
            </h:form>
        </h:column>
    </h:dataTable>

    <br/>
    <h:link outcome="/categorias/form" value="Nova Categoria" styleClass="btn-link"/>
    <br/>
    <h:link outcome="/index" value="Voltar ao Menu" styleClass="btn-link"/>

</h:body>
</html>
