<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>Clientes</title>
</h:head>
<h:body>

    <h1>Lista de Clientes</h1>

    <h:dataTable value="#{clienteBean.lista}" var="c" border="1">
        <h:column>#{c.nome}</h:column>
        <h:column>#{c.email}</h:column>
        <h:column>
            <h:form>
                <h:commandButton value="Editar" action="#{clienteBean.editar(c)}" />
                <h:commandButton value="Excluir" action="#{clienteBean.excluir(c)}" />
            </h:form>
        </h:column>
    </h:dataTable>

    <br/>
    <h:link outcome="/clientes/form" value="Novo Cliente" />
    <br/>
    <h:link outcome="/index" value="Voltar ao Menu" />

</h:body>
</html>
